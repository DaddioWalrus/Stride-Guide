<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stride Guide</title>

    <!-- PWA support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stride Guide" />
    <meta name="theme-color" content="#4A90D9" />

    <!-- Leaflet map library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Stride Guide styles -->
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>

    <!-- Map -->
    <div id="map"></div>

    <!-- Route Panel -->
    <div id="route-panel">

      <!-- Collapsed view — shows after route is generated -->
      <div class="panel-collapsed">
        <div class="nav-eta">
          <div id="route-time">-- min</div>
        </div>
        <div class="nav-center">
          <div id="route-dist">0.0 km</div>
        </div>
        <div class="collapsed-actions">
          <button class="change-btn" id="change-btn">Change</button>
          <button class="start-nav-btn" id="start-nav-btn">Start</button>
        </div>
      </div>

      <!-- Full panel -->
      <div class="panel-full">

        <!-- Loop / A→B Toggle -->
        <div class="toggle-container">
          <button class="toggle-btn" id="ab-btn">A→B</button>
          <button class="toggle-btn active" id="loop-btn">Loop</button>
        </div>

        <!-- Loop start location -->
        <div class="location-row" id="loop-location-row">
          <div class="location-input-wrap">
            <input
              class="location-input"
              id="loop-start-input"
              type="text"
              placeholder="Start location..."
            />
            <button class="gps-btn" id="loop-gps-btn" title="Use my location">📍</button>
          </div>
        </div>

        <!-- A→B start and destination locations -->
        <div class="location-rows hidden" id="ab-location-rows">
          <div class="location-input-wrap">
            <input
              class="location-input"
              id="ab-start-input"
              type="text"
              placeholder="Start location..."
            />
            <button class="gps-btn" id="ab-start-gps-btn" title="Use my location">📍</button>
          </div>
          <div class="location-input-wrap">
            <input
              class="location-input"
              id="ab-dest-input"
              type="text"
              placeholder="Destination..."
            />
            <button class="gps-btn" id="ab-dest-gps-btn" title="Use my location">📍</button>
          </div>
        </div>

        <!-- Time / Distance selector — Loop only -->
        <div class="mode-row hidden" id="mode-row">
          <button class="mode-btn" id="time-btn">⏱ Time</button>
          <button class="mode-btn" id="distance-btn">📏 Distance</button>
        </div>

        <!-- +/- value input -->
        <div class="step-row hidden" id="step-row">
          <button class="step-btn" id="step-down">−</button>
          <div class="step-value" id="step-value">30 min</div>
          <button class="step-btn" id="step-up">+</button>
        </div>

        <!-- Error message -->
        <div class="error-text hidden" id="error-text"></div>

        <!-- Generate button -->
        <button class="generate-btn hidden" id="generate-btn">Generate Route</button>

      </div>
    </div>

    <!-- Nav Panel -->
    <div id="nav-panel" class="hidden">
      <div class="nav-eta">
        <div id="nav-time">-- min</div>
      </div>
      <div class="nav-center" id="nav-center">
        <div id="nav-dist">0.00 km</div>
        <div id="nav-unit">metric</div>
        <div id="nav-pace">0.0 km/h</div>
      </div>
      <div class="nav-controls">
        <button class="stop-btn" id="stop-btn">Stop</button>
      </div>
    </div>

    <!-- Turn-by-turn instruction pill -->
    <div id="instruction-pill" class="hidden">
      <span id="instruction-arrow">↑</span>
      <span id="instruction-text"></span>
      <span id="instruction-dist"></span>
    </div>

    <!-- Arrival toast -->
    <div id="arrival-toast"></div>

    <!-- Scripts — order matters! -->
    <script>window.ORS_API_KEY = '%ORS_API_KEY%';</script>
    <script src="/js/map.js"></script>
    <script src="/js/route.js"></script>
    <script src="/js/ui.js"></script>

  </body>
</html>
