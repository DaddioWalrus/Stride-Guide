<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
    <title>Stride Guide</title>

    <!-- PWA support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stride Guide" />
    <meta name="theme-color" content="#4A90D9" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate/dist/leaflet-rotate-src.js"></script>

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>

    <div id="map"></div>

    <!-- A→B search panel -->
    <div id="search-panel" class="panel">
      <div class="preview-header">
        <span class="preview-title">Plan a Route</span>
      </div>
      <div class="search-bar">
        <input id="dest-input" class="search-input" type="text" placeholder="Where to?" />
        <button class="search-btn" id="search-btn">Search</button>
      </div>
      <ul id="suggestions" class="suggestions hidden"></ul>
    </div>

    <!-- Loop planning panel -->
    <div id="loop-panel" class="panel hidden">
      <div class="preview-header">
        <span class="preview-title">Plan a Loop</span>
      </div>
      <div class="step-row hidden" id="loop-step-row">
        <button class="step-btn" id="loop-step-down">−</button>
        <div class="step-center" id="loop-step-center">
          <div class="step-value" id="loop-step-value">30 min</div>
          <div class="step-unit-hint hidden" id="loop-unit-hint">Metric</div>
        </div>
        <button class="step-btn" id="loop-step-up">+</button>
      </div>
      <div class="loop-mode-row">
        <button class="mode-btn" id="loop-time-btn">⏱ Time</button>
        <button class="mode-btn" id="loop-dist-btn">📏 Distance</button>
      </div>
      <button class="primary-btn full-btn hidden" id="loop-generate-btn">Generate Route</button>
    </div>

    <!-- Phase 2: Destination preview -->
    <div id="preview-panel" class="panel hidden">
      <div class="preview-header">
        <button class="back-btn" id="preview-back">←</button>
        <span class="preview-title">Directions</span>
      </div>
      <div class="route-setup">
        <div class="route-field">
          <span class="field-label">From</span>
          <input class="field-input" id="start-input" type="text" placeholder="Getting your location..." />
          <button class="gps-btn small-gps" id="start-gps-btn">📍</button>
        </div>
        <div class="route-divider"></div>
        <div class="route-field">
          <span class="field-label">To</span>
          <div class="field-value" id="preview-dest"></div>
        </div>
      </div>
      <button class="primary-btn full-btn" id="directions-btn">Get Directions</button>
    </div>

    <!-- Route destination label (sits above route-panel) -->
    <div id="route-dest-label" class="hidden">
      <span id="route-dest-name"></span>
    </div>

    <!-- Phase 3: Route overview -->
    <div id="route-panel" class="panel row-panel hidden">
      <div class="nav-eta">
        <div id="route-time">-- min</div>
      </div>
      <div class="nav-center" id="route-center">
        <div id="route-dist">0.0 km</div>
        <div class="step-unit-hint" id="route-unit-hint">metric</div>
      </div>
      <div class="pin-card-actions">
        <button class="pin-close-btn" id="route-back">←</button>
        <button class="pin-close-btn hidden" id="loop-regen-btn">↺</button>
        <button class="primary-btn green-btn" id="start-btn">Start</button>
      </div>
    </div>

    <!-- Pin location label (floats above pin card) -->
    <div id="pin-location-label" class="hidden">
      <span id="pin-location-name">Locating...</span>
    </div>

    <!-- Pin Card -->
    <div id="pin-card" class="panel row-panel hidden">
      <div class="nav-eta">
        <div id="pin-time">-- min</div>
      </div>
      <div class="nav-center" id="pin-center">
        <div id="pin-dist">-- km</div>
        <div class="step-unit-hint hidden" id="pin-unit-hint">imperial</div>
      </div>
      <div class="pin-card-actions">
        <button class="pin-close-btn" id="pin-close-btn">←</button>
        <button class="start-nav-btn" id="pin-directions-btn">Start</button>
      </div>
    </div>

    <!-- Phase 4: Navigation -->
    <div id="nav-panel" class="panel row-panel hidden">
      <div class="nav-eta">
        <div id="nav-time">-- min</div>
      </div>
      <div class="nav-center" id="nav-center">
        <div id="nav-dist">0.00 km</div>
        <div id="nav-unit">metric</div>
      </div>
      <div class="nav-controls">
        <button class="stop-btn" id="stop-btn">Stop</button>
      </div>
    </div>

    <!-- Loading box (floats above panels while route is calculating) -->
    <div id="loading-box">Planning route...</div>

    <!-- Error toast (floats above all panels) -->
    <div id="error-toast"></div>

    <!-- Turn-by-turn instruction pill -->
    <div id="instruction-pill" class="hidden">
      <span id="instruction-arrow">↑</span>
      <span id="instruction-text"></span>
      <span id="instruction-dist"></span>
    </div>

    <!-- Arrival toast -->
    <div id="arrival-toast"></div>

    <!-- Mode selector -->
    <div id="mode-bar">
      <button class="mode-tab active" id="ab-tab">A→B</button>
      <button class="mode-tab" id="loop-tab">Loop</button>
    </div>

    <!-- Scripts — order matters! -->
    <script src="/js/map.js"></script>
    <script src="/js/route.js"></script>
    <script src="/js/ui.js"></script>

  </body>
</html>
