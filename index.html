<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
    <title>Stride Guide</title>

    <!-- PWA support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stride Guide" />
    <meta name="theme-color" content="#4A90D9" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate/dist/leaflet-rotate-src.js"></script>

    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>

    <div id="map"></div>

    <!-- Phase 1: Search -->
    <div id="search-panel">
      <ul id="suggestions" class="suggestions hidden"></ul>
      <div class="search-bar">
        <input id="dest-input" class="search-input" type="text" placeholder="Where to?" />
        <button class="search-btn" id="search-btn">Search</button>
      </div>
    </div>

    <!-- Phase 2: Destination preview -->
    <div id="preview-panel" class="panel hidden">
      <div class="preview-header">
        <button class="back-btn" id="preview-back">←</button>
        <span class="preview-title">Directions</span>
      </div>
      <div class="route-setup">
        <div class="route-field">
          <span class="field-label">From</span>
          <input class="field-input" id="start-input" type="text" placeholder="Getting your location..." />
          <button class="gps-btn small-gps" id="start-gps-btn">📍</button>
        </div>
        <div class="route-divider"></div>
        <div class="route-field">
          <span class="field-label">To</span>
          <div class="field-value" id="preview-dest"></div>
        </div>
      </div>
      <button class="primary-btn full-btn" id="directions-btn">Get Directions</button>
    </div>

    <!-- Phase 3: Route overview -->
    <div id="route-panel" class="panel row-panel hidden">
      <button class="back-btn" id="route-back">←</button>
      <div class="route-summary" id="route-summary"></div>
      <button class="primary-btn green-btn" id="start-btn">Start</button>
    </div>

    <!-- Phase 4: Navigation -->
    <div id="nav-panel" class="panel row-panel hidden">
      <div class="nav-stats">
        <div id="nav-time">-- min</div>
        <div id="nav-dist">0.0 km · 0.0 mi</div>
        <div id="nav-spd">0.0 km/h · 0.0 mph</div>
      </div>
      <button class="stop-btn" id="stop-btn">Stop</button>
    </div>

    <!-- Loading box (floats above panels while route is calculating) -->
    <div id="loading-box">Planning route...</div>

    <!-- Error toast (floats above all panels) -->
    <div id="error-toast"></div>

    <!-- Arrival toast -->
    <div id="arrival-toast"></div>

    <!-- Scripts — order matters! -->
    <script src="/js/map.js"></script>
    <script src="/js/route.js"></script>
    <script src="/js/ui.js"></script>

  </body>
</html>
